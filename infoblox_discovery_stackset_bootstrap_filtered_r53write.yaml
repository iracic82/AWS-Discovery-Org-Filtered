AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Bootstrap Stack to create a service-managed CloudFormation StackSet that deploys the
  'infoblox_discovery' IAM role with Route53 write permissions for DNS management.
  Targets Organizational Units (OUs) with optional account filtering —
  include specific accounts (INTERSECTION) or exclude accounts (DIFFERENCE).

Parameters:
  ExternalId:
    Type: String
    Default: "f90ae844-4072-47a5-a6a3-4f900e8317df"
    Description: External ID used by Infoblox when assuming the role
  AccountId:
    Type: String
    Default: "902917483333"
    Description: Infoblox AWS Account ID that will assume the role

  TargetOUsCsv:
    Type: String
    AllowedPattern: "^(ou-[a-z0-9]{4,32}-[a-z0-9]{8,32}|r-[a-z0-9]{4,32})(,(ou-[a-z0-9]{4,32}-[a-z0-9]{8,32}|r-[a-z0-9]{4,32}))*$"
    ConstraintDescription: "Must be comma-separated OU IDs (ou-xxxx-xxxxxxxx) or root IDs (r-xxxx)"
    Description: >
      Required: Comma-separated OU IDs (e.g. ou-abcd-12345678,ou-efgh-a1b2c3d4) or root ID (r-xxxx).

  AccountFilterMode:
    Type: String
    AllowedValues: ["NONE", "INTERSECTION", "DIFFERENCE"]
    Default: "NONE"
    Description: >
      NONE = deploy to all accounts in the OUs.
      INTERSECTION = deploy ONLY to accounts listed in AccountFilterCsv.
      DIFFERENCE = deploy to all accounts EXCEPT those listed in AccountFilterCsv.

  AccountFilterCsv:
    Type: String
    Default: ""
    AllowedPattern: "^$|^[0-9]{12}(,[0-9]{12})*$"
    ConstraintDescription: "Must be empty or comma-separated 12-digit AWS Account IDs"
    Description: >
      Comma-separated AWS Account IDs to include or exclude (depending on AccountFilterMode).
      Required when AccountFilterMode is INTERSECTION or DIFFERENCE. Ignored when NONE.

  Regions:
    Type: List<String>
    Default: "us-east-1"
    Description: One or more AWS regions for deployment (IAM is global — one region is usually enough)

  AutoDeployNewAccounts:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: Automatically deploy the role to new accounts joining the target OUs

  CallAs:
    Type: String
    AllowedValues: ["SELF", "DELEGATED_ADMIN"]
    Default: "SELF"
    Description: >
      SELF = deploying from the AWS Organizations management account.
      DELEGATED_ADMIN = deploying from a member account registered as a
      StackSets delegated administrator. The member account must be registered
      first from the management account:
      aws organizations register-delegated-administrator
      --service-principal=member.org.stacksets.cloudformation.amazonaws.com
      --account-id=<member-account-id>

Rules:
  AccountFilterRequiresAccounts:
    RuleCondition: !Not [ !Equals [ !Ref AccountFilterMode, "NONE" ] ]
    Assertions:
      - Assert: !Not [ !Equals [ !Ref AccountFilterCsv, "" ] ]
        AssertDescription: "AccountFilterCsv must not be empty when AccountFilterMode is INTERSECTION or DIFFERENCE"

Conditions:
  UseFilter: !Not [ !Equals [ !Ref AccountFilterMode, "NONE" ] ]
  AutoDeployEnabled: !Equals [ !Ref AutoDeployNewAccounts, "true" ]

Resources:
  DiscoveryRoleStackSet:
    Type: AWS::CloudFormation::StackSet
    Properties:
      StackSetName: Infoblox-Discovery-Role
      PermissionModel: SERVICE_MANAGED
      CallAs: !Ref CallAs
      ManagedExecution:
        Active: true
      OperationPreferences:
        MaxConcurrentPercentage: 100
        FailureTolerancePercentage: 10
        RegionConcurrencyType: PARALLEL
      AutoDeployment:
        Enabled: !If [ AutoDeployEnabled, true, false ]
        RetainStacksOnAccountRemoval: false
      Capabilities:
        - CAPABILITY_NAMED_IAM
      TemplateBody: |
        AWSTemplateFormatVersion: '2010-09-09'
        Description: Infoblox infoblox_discovery IAM role with asset discovery and Route53 write permissions
        Parameters:
          ExternalId:
            Type: String
          AccountId:
            Type: String
        Resources:
          InfobloxDiscoveryRole:
            Type: AWS::IAM::Role
            Properties:
              RoleName: infoblox_discovery
              AssumeRolePolicyDocument:
                Version: "2012-10-17"
                Statement:
                  - Effect: Allow
                    Principal:
                      AWS: !Sub "arn:aws:iam::${AccountId}:root"
                    Action: sts:AssumeRole
                    Condition:
                      StringEquals:
                        sts:ExternalId: !Ref ExternalId
              Policies:
                - PolicyName: InfobloxAssetDiscovery
                  PolicyDocument:
                    Version: "2012-10-17"
                    Statement:
                      - Sid: S3BucketMetadataReadOnly
                        Effect: Allow
                        Action:
                          - s3:ListAllMyBuckets
                          - s3:GetBucketLocation
                          - s3:GetBucketWebsite
                          - s3:GetBucketPublicAccessBlock
                          - s3:GetBucketAcl
                          - s3:GetBucketPolicy
                          - s3:GetBucketPolicyStatus
                        Resource: "*"
                      - Sid: VPCSubnetRouteReadOnly
                        Effect: Allow
                        Action:
                          - ec2:DescribeRegions
                          - ec2:DescribeVpcs
                          - ec2:DescribeVpcAttribute
                          - ec2:DescribeVpcPeeringConnections
                          - ec2:DescribeSubnets
                          - ec2:DescribeRouteTables
                          - ec2:DescribeAvailabilityZones
                          - ec2:DescribeManagedPrefixLists
                          - ec2:DescribeInternetGateways
                          - ec2:DescribeEgressOnlyInternetGateways
                          - ec2:DescribeNatGateways
                          - ec2:DescribeTransitGateways
                          - ec2:DescribeTransitGatewayVpcAttachments
                          - ec2:DescribeTransitGatewayPeeringAttachments
                          - ec2:DescribeAddresses
                          - ec2:DescribeNetworkAcls
                          - ec2:DescribeNetworkInterfaces
                          - ec2:DescribeVpcEndpoints
                          - ec2:DescribeVpnConnections
                          - ec2:DescribeVpnGateways
                          - ec2:DescribeCustomerGateways
                        Resource: "*"
                      - Sid: IPAMReadOnly
                        Effect: Allow
                        Action:
                          - ec2:DescribeIpams
                          - ec2:DescribeIpamPools
                          - ec2:DescribeIpamScopes
                          - ec2:DescribeIpamResourceDiscoveries
                          - ec2:GetIpamPoolCidrs
                          - ec2:GetIpamPoolAllocations
                          - ec2:GetIpamResourceCidrs
                        Resource: "*"
                      - Sid: SecurityGroupReadOnly
                        Effect: Allow
                        Action:
                          - ec2:DescribeSecurityGroups
                          - ec2:DescribeSecurityGroupRules
                          - ec2:DescribeSecurityGroupReferences
                          - ec2:DescribeStaleSecurityGroups
                          - ec2:DescribeInstances
                        Resource: "*"
                      - Sid: StorageVolumeReadOnly
                        Effect: Allow
                        Action:
                          - ec2:DescribeVolumes
                          - ec2:DescribeVolumeStatus
                          - ec2:DescribeSnapshots
                          - ec2:DescribeSnapshotAttribute
                        Resource: "*"
                      - Sid: LoadBalancerReadOnly
                        Effect: Allow
                        Action:
                          - elasticloadbalancing:DescribeLoadBalancers
                          - elasticloadbalancing:DescribeLoadBalancerAttributes
                          - elasticloadbalancing:DescribeListeners
                          - elasticloadbalancing:DescribeRules
                          - elasticloadbalancing:DescribeTargetGroups
                          - elasticloadbalancing:DescribeTargetHealth
                        Resource: "*"
                      - Sid: DirectConnectReadOnly
                        Effect: Allow
                        Action:
                          - directconnect:DescribeDirectConnectGateways
                          - directconnect:DescribeDirectConnectGatewayAttachments
                          - directconnect:DescribeConnections
                          - directconnect:DescribeVirtualInterfaces
                        Resource: "*"
                      - Sid: CloudWatchReadOnly
                        Effect: Allow
                        Action:
                          - cloudwatch:ListMetrics
                          - cloudwatch:GetMetricStatistics
                          - cloudwatch:GetMetricData
                        Resource: "*"
                      - Sid: Route53ReadOnly
                        Effect: Allow
                        Action:
                          - route53:GetHostedZone
                          - route53:ListHostedZones
                          - route53:ListResourceRecordSets
                          - route53:ListTagsForResources
                          - route53:ListQueryLoggingConfigs
                          - route53:GetHealthCheck
                          - route53:ListHealthChecks
                        Resource: "*"
                      - Sid: Route53ResolverReadOnly
                        Effect: Allow
                        Action:
                          - route53resolver:ListResolverEndpoints
                          - route53resolver:ListResolverEndpointIpAddresses
                          - route53resolver:ListResolverRules
                          - route53resolver:ListResolverRuleAssociations
                        Resource: "*"
                      - Sid: Route53Write
                        Effect: Allow
                        Action:
                          - route53:ChangeResourceRecordSets
                          - route53:CreateHostedZone
                          - route53:DeleteHostedZone
                          - route53:AssociateVPCWithHostedZone
                          - route53:DisassociateVPCFromHostedZone
                          - route53:UpdateHostedZoneComment
                        Resource: "*"
              Tags:
                - Key: CreatedBy
                  Value: CloudFormation-StackSet
                - Key: Purpose
                  Value: Infoblox-Discovery
        Outputs:
          RoleARN:
            Description: ARN of the created IAM role
            Value: !GetAtt InfobloxDiscoveryRole.Arn
      Parameters:
        - ParameterKey: ExternalId
          ParameterValue: !Ref ExternalId
        - ParameterKey: AccountId
          ParameterValue: !Ref AccountId
      StackInstancesGroup:
        - DeploymentTargets:
            OrganizationalUnitIds: !Split [ ",", !Ref TargetOUsCsv ]
            AccountFilterType: !If [ UseFilter, !Ref AccountFilterMode, !Ref "AWS::NoValue" ]
            Accounts: !If [ UseFilter, !Split [ ",", !Ref AccountFilterCsv ], !Ref "AWS::NoValue" ]
          Regions: !Ref Regions

Outputs:
  StackSetName:
    Description: Name of the created StackSet
    Value: !Ref DiscoveryRoleStackSet
